<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Camp Check-In Station</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#141a22;--ink-2:#1e2733;--paper:#f6f5f2;--card:#fff;--line:#e2ded6;--orange:#e8590c;--orange-soft:#fdeee3;--amber:#ffb63d;--green:#15803d;--green-soft:#e9f7ee;--red:#c92a2a;--red-soft:#fdecec;--mut:#6b7280}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
h1,h2,h3,.disp{font-family:'Barlow Condensed',sans-serif}
button,input{font-family:inherit}

/* ---------- Sign-in gate ---------- */
#gate{max-width:420px;margin:60px auto;padding:0 20px}
#gate .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px}
#gate h1{font-size:24px;text-transform:uppercase;text-align:center;margin-bottom:4px}
#gate p{color:var(--mut);font-size:14px;text-align:center;margin-bottom:20px}
#gate label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);display:block;margin:12px 0 4px}
#gate input{width:100%;font-size:17px;padding:13px 14px;border:1.5px solid var(--line);border-radius:9px}
#gate .btn{width:100%;margin-top:18px;padding:14px;font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;background:var(--orange);color:#fff;border:none;border-radius:9px;cursor:pointer}
#gate .msg{margin-top:12px;font-size:13px;text-align:center;color:var(--red)}

/* ---------- Header / role tabs ---------- */
header{background:var(--ink);color:#fff;padding:14px 16px;border-bottom:4px solid var(--orange)}
.hrow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
header h1{font-size:20px;text-transform:uppercase;letter-spacing:.02em}
header h1 span{color:var(--amber)}
.campfield{display:flex;align-items:center;gap:6px;font-size:12px;color:#9aa4b1}
.campfield input{width:110px;font-size:13px;padding:5px 8px;border-radius:6px;border:1px solid #2c3947;background:var(--ink-2);color:#fff}
.livepill{font-size:11px;color:#9aa4b1;padding:3px 8px}
.signoutbtn{font-size:12px;color:#9aa4b1;background:transparent;border:1px solid #2c3947;border-radius:6px;padding:5px 10px;cursor:pointer}

.roletabs{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px}
.roletabs button{padding:12px 4px;border-radius:10px;border:none;background:var(--ink-2);color:#9aa4b1;font-family:'Barlow Condensed';font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.roletabs button .ic{font-size:20px}
.roletabs button.on{background:var(--orange);color:#fff}

main{max-width:720px;margin:0 auto;padding:16px 14px 60px}
.searchbar{margin-bottom:14px}
.searchbar input{width:100%;font-size:18px;padding:14px 16px;border:2px solid var(--line);border-radius:10px;background:#fff}
.searchbar input:focus{outline:2px solid var(--orange);border-color:var(--orange)}

.plist{display:flex;flex-direction:column;gap:10px}
.prow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.prow .who{flex:1;min-width:140px}
.prow .who b{font-size:17px;display:block}
.prow .who small{color:var(--mut);font-size:13px}
.badge{font-family:'Barlow Condensed';font-size:12px;font-weight:600;text-transform:uppercase;padding:4px 9px;border-radius:6px;white-space:nowrap}
.badge.due{background:var(--red-soft);color:var(--red)}
.badge.paid{background:var(--green-soft);color:var(--green)}
.badge.done{background:var(--green-soft);color:var(--green)}
.bigbtn{font-family:'Barlow Condensed';font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:12px 18px;border-radius:9px;border:none;background:var(--orange);color:#fff;cursor:pointer;white-space:nowrap}
.bigbtn:active{filter:brightness(.92)}
.bigbtn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.jinput{width:80px;font-size:20px;text-align:center;font-weight:700;padding:10px 6px;border:2px solid var(--line);border-radius:9px}
.jinput.dupe{border-color:var(--red);background:var(--red-soft)}
.tag{display:inline-block;background:var(--orange-soft);color:var(--orange);font-weight:600;font-size:12px;border-radius:5px;padding:2px 7px;margin:2px 3px 0 0}
.empty{text-align:center;color:var(--mut);padding:50px 20px;background:var(--card);border:1px dashed var(--line);border-radius:12px}
.empty b{display:block;font-family:'Barlow Condensed';font-size:19px;color:var(--ink);text-transform:uppercase;margin-bottom:4px}

/* ---------- Add-on popover ---------- */
.addon-pop{position:fixed;z-index:200;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(20,26,34,.25);padding:14px;width:260px;left:50%;top:50%;transform:translate(-50%,-50%)}
.addon-pop-head{font-family:'Barlow Condensed';font-weight:600;font-size:16px;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--line);margin-bottom:8px}
.addon-opt{display:flex;align-items:center;gap:10px;padding:8px 4px;font-size:16px}
.addon-opt input{width:20px;height:20px;accent-color:var(--orange)}
.addon-custom{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.addon-custom input{flex:1;font-size:14px;padding:8px}
.addon-close{width:100%;margin-top:10px}
.scrim{position:fixed;inset:0;background:rgba(20,26,34,.4);z-index:150}

/* ---------- Photo role ---------- */
.photo-row .thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;object-position:center 25%;background:#eee}
.photo-row .noimg{width:56px;height:56px;border-radius:8px;background:#eee;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:22px}
.hiddenfile{display:none}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:9px;font-size:14px;z-index:300;box-shadow:0 6px 20px rgba(0,0,0,.3)}

/* Station teams — match admin team cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.team-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.team-card header{background:var(--ink);color:#fff;padding:10px 14px;border-bottom:3px solid var(--orange);display:flex;justify-content:space-between;align-items:center;gap:8px}
.team-card header h3{font-size:18px;text-transform:uppercase;margin:0}
.team-card header small{font-family:'Barlow Condensed';color:var(--amber);font-size:13px;font-weight:600;white-space:nowrap}
.team-card ul{list-style:none;margin:0;padding:0}
.team-card li{display:grid;grid-template-columns:42px 1fr auto;gap:8px;align-items:center;padding:8px 14px;border-top:1px solid var(--line);font-size:14px}
.team-card li:first-child{border-top:none}
.team-card .jnum{font-family:'Barlow Condensed';font-weight:700;font-size:16px;color:var(--orange)}
.team-card .pmeta{color:var(--mut);font-size:12px;text-align:right;line-height:1.3}
.team-card footer{padding:8px 14px;background:#faf9f6;border-top:1px solid var(--line);font-size:12px;color:var(--mut);display:flex;gap:12px;flex-wrap:wrap}
.team-sec{font-family:'Barlow Condensed';font-size:18px;text-transform:uppercase;margin:8px 0 12px}
.grp-tally{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.gt-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;border-left:5px solid var(--orange)}
.gt-card.b{border-left-color:var(--ink)}
.gt-card h4{font-family:'Barlow Condensed';font-size:18px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.gt-card .rng{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
.gt-nums{display:flex;align-items:baseline;gap:16px;margin-top:10px;flex-wrap:wrap}
.gt-nums .big{font-family:'Barlow Condensed';font-size:32px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.gt-nums .big small{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-left:5px}
.gt-nums .arrow{font-size:20px;color:var(--mut)}
.gt-nums .teams{font-family:'Barlow Condensed';font-size:24px;font-weight:700;color:var(--orange)}
.gt-card.b .gt-nums .teams{color:var(--ink)}
.gt-nums .teams small{font-size:12px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-left:5px}
.gt-detail{font-size:12px;color:var(--mut);margin-top:8px}
.gt-detail b{color:var(--ink);font-weight:600}
@media(max-width:640px){.grp-tally{grid-template-columns:1fr}}

/* ---------- Live camera modal ---------- */
#camModal{display:none;position:fixed;inset:0;z-index:400;background:rgba(20,26,34,.92);flex-direction:column;align-items:center;justify-content:center;padding:16px}
#camModal.on{display:flex}
#camModal .cam-head{color:#fff;text-align:center;margin-bottom:12px}
#camModal .cam-head b{font-family:'Barlow Condensed';font-size:22px;text-transform:uppercase;display:block}
#camModal .cam-head span{color:#9aa4b1;font-size:13px}
#camModal .cam-stage{position:relative;width:min(92vw,420px);aspect-ratio:3/4;border-radius:16px;overflow:hidden;background:#000;border:3px solid var(--orange)}
#camModal video,#camModal canvas.preview{width:100%;height:100%;object-fit:cover;display:block}
#camModal .face-guide{pointer-events:none;position:absolute;inset:8% 12% 10%;border:2px dashed rgba(255,255,255,.75);border-radius:18px;box-shadow:0 0 0 999px rgba(0,0,0,.28)}
#camModal .cam-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;width:min(92vw,420px)}
#camModal .cam-actions .bigbtn{flex:1;min-width:120px}
#camModal .cam-hint{color:#9aa4b1;font-size:12px;text-align:center;margin-top:10px;max-width:420px}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <h1>Check-In Station</h1>
    <p>Sign in once per tablet for the day</p>
    <label>Email</label><input type="text" id="gEmail" autocomplete="username">
    <label>Password</label><input type="password" id="gPass" autocomplete="current-password">
    <button class="btn" id="gBtn">Sign In</button>
    <div class="msg" id="gMsg"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="hrow">
      <h1>Check-In <span>Station</span></h1>
      <div class="campfield">
        Camp: <input type="text" id="campCodeInput" placeholder="fall-2026">
        <button class="signoutbtn" id="btnSignOut">Sign Out</button>
      </div>
    </div>
    <div class="livepill" id="livePill">Connecting…</div>
    <div class="roletabs">
      <button data-role="checkin" class="on"><span class="ic">✅</span>Check-In</button>
      <button data-role="jersey"><span class="ic">🔢</span>Jersey</button>
      <button data-role="addons"><span class="ic">➕</span>Add-Ons</button>
      <button data-role="photos"><span class="ic">📷</span>Photos</button>
      <button data-role="playerdata"><span class="ic">👤</span>Player Data</button>
      <button data-role="teams"><span class="ic">👕</span>Teams</button>
    </div>
  </header>
  <main>
    <div class="searchbar"><input type="search" id="q" placeholder="Search name or school…"></div>
    <div class="plist" id="plist"></div>
  </main>
</div>

<input type="file" id="photoInput" class="hiddenfile" accept="image/*" capture="environment">

<div id="camModal" aria-hidden="true">
  <div class="cam-head">
    <b id="camWho">Take photo</b>
    <span>Frame head and upper body in the box, then capture</span>
  </div>
  <div class="cam-stage">
    <video id="camVideo" playsinline muted autoplay></video>
    <canvas id="camSnap" class="preview" style="display:none"></canvas>
    <div class="face-guide"></div>
  </div>
  <div class="cam-actions">
    <button class="bigbtn ghost" type="button" id="camCancel">Cancel</button>
    <button class="bigbtn ghost" type="button" id="camFile">From gallery</button>
    <button class="bigbtn" type="button" id="camShutter">Capture</button>
    <button class="bigbtn" type="button" id="camRetake" style="display:none">Retake</button>
    <button class="bigbtn" type="button" id="camUse" style="display:none">Upload ✓</button>
  </div>
  <p class="cam-hint">Photos are framed as upper-body shots (not tight headshots), then uploaded right away.</p>
</div>

<script>
/* =====================================================================
   CONFIG — same Supabase project as index.html / admin.html. Set once
   per tablet (or once, then just bookmark the file / add to home screen).
   DEFAULT_CAMP_CODE pre-fills the Camp field on a brand-new device —
   update it each season so new tablets aren't blank on first sign-in.
   It's just a starting point; the field on-screen can still be changed.
===================================================================== */
const SUPABASE_URL = "https://nxncasbkrcermftbviuw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54bmNhc2JrcmNlcm1mdGJ2aXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMTY3NjYsImV4cCI6MjA5OTc5Mjc2Nn0.XdcpcrTLhWeJWf6DXS2PPkXOGjYy8m9nFtagbFoqt9I";
const DEFAULT_CAMP_CODE = "mid-atlantic-2026";
/* ===================================================================== */

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function formatHeight(h){
  if(h==null||h==='') return '';
  const s=String(h).trim();
  if(!s||s==='—'||s==='-') return '';
  let m=s.match(/^(\d+)\s*['′]\s*(\d{1,2})\s*["″]?$/);
  if(m) return m[1]+"'"+ (+m[2]);
  m=s.match(/^(\d+)\s*(?:ft|feet|foot)\.?\s*(\d{1,2})?/i);
  if(m) return m[1]+"'"+ (+(m[2]||0));
  const n=Number(s);
  if(Number.isFinite(n)){
    if(n>40&&n<90){ const f=Math.floor(n/12), inch=Math.round(n%12); return f+"'"+inch; }
    if(n>=3&&n<8){ const f=Math.floor(n), inch=Math.round((n-f)*12); return f+"'"+inch; }
  }
  return s;
}

let campCode = localStorage.getItem('stationCampCode') || DEFAULT_CAMP_CODE || '';
$('#campCodeInput').value = campCode;
$('#campCodeInput').addEventListener('input', e=>{
  campCode = e.target.value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-');
  localStorage.setItem('stationCampCode', campCode);
  players=[]; teams=[]; renderList();
  pollPlayers(); pollTeams();
});

// --- Auth (kept in localStorage — these are shared, dedicated tablets
// that sit at a table all day, so we favor staying signed in over
// re-entering a password between every single player) ---
let authSession=null;
try{ const raw=localStorage.getItem('stationAuth'); if(raw) authSession=JSON.parse(raw); }catch(e){}

function showApp(){
  $('#gate').style.display='none';
  $('#app').style.display='block';
  pollPlayers(); pollTeams();
  setInterval(pollPlayers, 4000);
  setInterval(pollTeams, 4000);
}
if(authSession && authSession.access_token) showApp();

$('#gBtn').addEventListener('click', async ()=>{
  const email=$('#gEmail').value.trim(), pass=$('#gPass').value;
  if(!email||!pass){ $('#gMsg').textContent='Enter email and password.'; return; }
  $('#gMsg').textContent='Signing in…'; $('#gMsg').style.color='var(--mut)';
  try{
    const res=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
      method:'POST', headers:{'apikey':SUPABASE_ANON_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const body=await res.json();
    if(res.ok && body.access_token){
      authSession={access_token:body.access_token, refresh_token:body.refresh_token, email};
      localStorage.setItem('stationAuth', JSON.stringify(authSession));
      showApp();
    } else {
      $('#gMsg').style.color='var(--red)';
      $('#gMsg').textContent='Sign-in failed: '+(body.error_description||body.msg||'check email/password');
    }
  }catch(e){ $('#gMsg').style.color='var(--red)'; $('#gMsg').textContent='Could not reach Supabase.'; }
});
$('#btnSignOut').addEventListener('click', ()=>{
  authSession=null; localStorage.removeItem('stationAuth');
  location.reload();
});

function authHeaders(extra){
  return Object.assign({apikey:SUPABASE_ANON_KEY, Authorization:'Bearer '+(authSession?authSession.access_token:SUPABASE_ANON_KEY)}, extra||{});
}

// --- Shared player list, polled every 4s ---
let players=[];
let role='checkin', query='';
async function pollPlayers(){
  if(!campCode){ $('#livePill').textContent='Enter a Camp Code above.'; return; }
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/players?camp_code=eq.'+encodeURIComponent(campCode)+'&select=*&order=first.asc',{
      headers:authHeaders()
    });
    if(!res.ok){
      if(res.status===401||res.status===403){ $('#livePill').textContent='Session expired — sign out and back in.'; }
      else $('#livePill').textContent='Could not load — retrying…';
      return;
    }
    players=await res.json();
    $('#livePill').textContent='🟢 Live — '+players.length+' players · updated '+new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit',second:'2-digit'});
    renderList();
  }catch(e){ $('#livePill').textContent='⚪ Offline — retrying…'; }
}

// Team rosters — read from the same public camp_live table the parent
// page (index.html) uses. Read-only here: teams get assigned in
// admin.html, this is just so staff can look them up on the tablet.
let teams=[];
let teamsPosted=false;
let groupCfg={ gA1:2027, gA2:2030, gB1:2031, gB2:2035, numA:3, numB:3 };
const TEAM_BRACKETS=[[0,27,3],[28,40,4],[41,54,6],[55,69,8],[70,84,10],[85,98,12],[99,112,14]];
function teamsForCount(n){
  for(const [lo,hi,t] of TEAM_BRACKETS) if(n>=lo && n<=hi) return t;
  return n>112 ? 14 : 3;
}
function stationGroupOf(y){
  y=+y;
  if(y>=groupCfg.gA1 && y<=groupCfg.gA2) return 'A';
  if(y>=groupCfg.gB1 && y<=groupCfg.gB2) return 'B';
  return null;
}
function renderGroupTally(){
  const pool=players.filter(p=>String(p.jersey||'').trim());
  const inA=pool.filter(p=>stationGroupOf(p.grad_year)==='A');
  const inB=pool.filter(p=>stationGroupOf(p.grad_year)==='B');
  const outside=pool.filter(p=>!stationGroupOf(p.grad_year));
  const numA=teamsForCount(inA.length);
  const numB=teamsForCount(inB.length);
  const per=(n,t)=>{ if(!t) return '—'; const base=Math.floor(n/t), extra=n%t; return extra? (base+'–'+(base+1)) : String(base); };
  const card=(cls,label,y1,y2,list,tCount,names)=>`<div class="gt-card ${cls}">
    <h4>${label}</h4><div class="rng">Grad years ${y1}–${y2} · ${names}</div>
    <div class="gt-nums">
      <span class="big">${list.length}<small>players w/ jersey</small></span>
      <span class="arrow">→</span>
      <span class="teams">${tCount}<small>teams</small></span>
    </div>
    <div class="gt-detail">${list.length? 'About <b>'+per(list.length,tCount)+'</b> players per team.' : 'No numbered players in this range yet.'}</div>
  </div>`;
  return `<div class="grp-tally">`
    + card('','Group A', groupCfg.gA1, groupCfg.gA2, inA, numA, 'Teams 1–'+numA)
    + card('b','Group B', groupCfg.gB1, groupCfg.gB2, inB, numB, 'Teams '+(numA+1)+'–'+(numA+numB))
    + (outside.length? `<div class="gt-card" style="grid-column:1/-1;border-left-color:var(--red)"><h4>Outside both ranges</h4><div class="gt-detail"><b>${outside.length}</b> numbered player(s) outside ${groupCfg.gA1}–${groupCfg.gA2} and ${groupCfg.gB1}–${groupCfg.gB2}.</div></div>`:'')
    + `</div>`;
}
async function pollTeams(){
  if(!campCode) return;
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/camp_live?code=eq.'+encodeURIComponent(campCode)+'&select=data,updated_at',{
      headers:{apikey:SUPABASE_ANON_KEY}
    });
    if(!res.ok) return;
    const rows=await res.json();
    const data=(rows && rows[0] && rows[0].data) || {};
    teams=data.teams || [];
    // Legacy rows (no teamsPosted flag) still show teams if present
    teamsPosted = teams.length ? (data.teamsPosted!==false) : false;
    if(data.groups){
      groupCfg={
        gA1:Number(data.groups.gA1)||groupCfg.gA1, gA2:Number(data.groups.gA2)||groupCfg.gA2,
        gB1:Number(data.groups.gB1)||groupCfg.gB1, gB2:Number(data.groups.gB2)||groupCfg.gB2,
        numA:Number(data.groups.numA)||groupCfg.numA, numB:Number(data.groups.numB)||groupCfg.numB
      };
    } else if(teams.length){
      // Infer year ranges from posted team rosters when groups weren't synced yet
      const byNum=teams.map(t=>({ n:+(String(t.name).match(/\d+/)||[0])[0], years:t.players.map(p=>+p.yr).filter(Boolean) }))
        .filter(t=>t.n).sort((a,b)=>a.n-b.n);
      const split=groupCfg.numA || Math.ceil(byNum.length/2) || 3;
      const aYears=byNum.filter(t=>t.n<=split).flatMap(t=>t.years);
      const bYears=byNum.filter(t=>t.n>split).flatMap(t=>t.years);
      if(aYears.length){ groupCfg.gA1=Math.min(...aYears); groupCfg.gA2=Math.max(...aYears); }
      if(bYears.length){ groupCfg.gB1=Math.min(...bYears); groupCfg.gB2=Math.max(...bYears); }
      groupCfg.numA=split; groupCfg.numB=Math.max(1, byNum.length-split);
    }
    if(role==='teams') renderList();
  }catch(e){ /* stay quiet, retry next tick */ }
}

$$('.roletabs button').forEach(b=>b.addEventListener('click', ()=>{
  $$('.roletabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); role=b.dataset.role;
  $('#q').value=''; query='';
  renderList();
}));
$('#q').addEventListener('input', e=>{ query=e.target.value.toLowerCase().trim(); renderList(); });

function hasDue(p){ return (parseFloat(p.balance)||0)>0 || (p.pay_status && !/paid/i.test(p.pay_status)); }
function matches(p){
  if(!query) return true;
  return (`${p.first} ${p.last} ${p.school}`).toLowerCase().includes(query);
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 2200);
}

async function patchPlayer(id, fields){
  fields.updated_at=new Date().toISOString();
  const res=await fetch(SUPABASE_URL+'/rest/v1/players?id=eq.'+id,{
    method:'PATCH',
    headers:authHeaders({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body:JSON.stringify(fields)
  });
  if(!res.ok){ toast('⚠ Save failed — check connection'); return false; }
  // optimistic local update so the UI feels instant; next poll reconciles
  const p=players.find(x=>x.id===id); if(p) Object.assign(p, fields);
  return true;
}

function renderList(){
  const wrap=$('#plist');

  if(role==='teams'){
    let html=renderGroupTally();
    const posted = teams.length && teamsPosted;
    if(!posted){
      html+='<div class="empty"><b>No Teams Posted yet</b>Group counts update live as jerseys are assigned. Full rosters appear after Sync Teams to Parent Page in admin.</div>';
      wrap.innerHTML=html;
      return;
    }
    const q=query;
    const filtered=teams.map(t=>({
      name:t.name,
      players:t.players.filter(p=>!q || (p.n||'').toLowerCase().includes(q) || (p.sc||'').toLowerCase().includes(q) || String(p.j||'')===q)
    })).filter(t=>!q || t.players.length || (t.name||'').toLowerCase().includes(q));
    if(!filtered.length){ wrap.innerHTML=html+'<div class="empty"><b>No matches</b></div>'; return; }
    wrap.innerHTML=html+`<div class="team-grid">${filtered.map(t=>{
      const ps=t.players.slice().sort((a,b)=>(+b.j||0)-(+a.j||0));
      return `<div class="team-card">
        <header><h3>${esc(t.name)}</h3><small>${ps.length} players</small></header>
        <ul>${ps.map(p=>`<li>
          <span class="jnum">#${esc(p.j)}</span>
          <span><b>${esc(p.n)}</b><br><span style="color:var(--mut);font-size:12px">${esc(p.sc||'')}</span></span>
          <span class="pmeta">${esc(formatHeight(p.ht))||'—'}<br>${esc(p.pos||'—')} · ${esc(p.yr||'')}</span>
        </li>`).join('')}</ul>
      </div>`;
    }).join('')}</div>`;
    return;
  }

  let rows;
  if(role==='checkin') rows=players.filter(p=>!p.checked_in && matches(p));
  else if(role==='jersey') rows=players.filter(p=>p.checked_in && !String(p.jersey).trim() && matches(p));
  else if(role==='addons') rows=players.filter(p=>p.checked_in && matches(p));
  else if(role==='photos'){
    // Stay here until they have BOTH a jersey and a photo. No jersey → still Photos.
    rows=players.filter(p=>{
      const hasJ=!!String(p.jersey||'').trim();
      const hasPh=!!p.photo_url;
      return matches(p) && (!hasJ || !hasPh);
    }).sort((a,b)=>{
      const aj=String(a.jersey||'').trim()?1:0, bj=String(b.jersey||'').trim()?1:0;
      if(aj!==bj) return bj-aj; // jersey holders (ready to shoot) first
      const an=a.photo_url?1:0, bn=b.photo_url?1:0;
      if(an!==bn) return an-bn;
      return (a.last||'').localeCompare(b.last||'');
    });
  }
  else if(role==='playerdata'){
    // Photo taken + jersey assigned → done with photo line
    rows=players.filter(p=>String(p.jersey||'').trim() && p.photo_url && matches(p))
      .sort((a,b)=>(+a.jersey||0)-(+b.jersey||0));
  }
  else rows=players.filter(p=>matches(p));

  if(!players.length){ wrap.innerHTML='<div class="empty"><b>No roster yet</b>Waiting for the roster to be pushed from admin.html.</div>'; return; }
  if(!rows.length){
    const msg={
      checkin:'Everyone is checked in',
      jersey:'No one waiting on a jersey',
      addons:'No checked-in players yet',
      photos:'Everyone with a jersey has a photo — see Player Data',
      playerdata:'No completed player cards yet — take photos after assigning jerseys'
    }[role];
    wrap.innerHTML='<div class="empty"><b>'+msg+'</b></div>'; return;
  }

  if(role==='checkin'){
    wrap.innerHTML=rows.map(p=>`<div class="prow">
      <div class="who"><b>${esc(p.first)} ${esc(p.last)}</b><small>${esc(p.grad_year)} · ${esc(p.position)||'—'} · ${esc(p.school)}</small></div>
      ${hasDue(p)?`<span class="badge due">Owes${p.balance?' $'+esc(p.balance):''}</span>`:'<span class="badge paid">Paid</span>'}
      <button class="bigbtn" data-checkin="${p.id}">Check In ✓</button>
    </div>`).join('');
    wrap.querySelectorAll('[data-checkin]').forEach(b=>b.addEventListener('click', async ()=>{
      b.disabled=true; b.textContent='…';
      if(await patchPlayer(b.dataset.checkin, {checked_in:true})){ toast('Checked in'); renderList(); }
    }));
  } else if(role==='jersey'){
    wrap.innerHTML=rows.map(p=>`<div class="prow">
      <div class="who"><b>${esc(p.first)} ${esc(p.last)}</b><small>${esc(p.grad_year)} · ${esc(p.position)||'—'} · ${esc(p.school)}</small></div>
      <input class="jinput" type="text" inputmode="numeric" placeholder="##" data-jin="${p.id}">
      <button class="bigbtn" data-assign="${p.id}">Assign</button>
    </div>`).join('');
    const assign=async (id)=>{
      const inp=wrap.querySelector(`[data-jin="${id}"]`);
      const j=inp.value.trim();
      if(!j){ inp.focus(); return; }
      if(players.some(x=>x.id!==id && String(x.jersey).trim()===j)){ inp.classList.add('dupe'); toast('#'+j+' is already taken'); return; }
      if(await patchPlayer(id, {jersey:j})){ toast('#'+j+' assigned'); renderList(); }
    };
    wrap.querySelectorAll('[data-assign]').forEach(b=>b.addEventListener('click', ()=>assign(b.dataset.assign)));
    wrap.querySelectorAll('[data-jin]').forEach(inp=>inp.addEventListener('keydown', e=>{ if(e.key==='Enter') assign(inp.dataset.jin); }));
  } else if(role==='addons'){
    wrap.innerHTML=rows.map(p=>{
      const tags=[...(p.addons_manual||[])];
      return `<div class="prow">
        <div class="who"><b>${esc(p.first)} ${esc(p.last)}</b><small>#${esc(p.jersey)||'—'} · ${esc(p.school)}</small></div>
        <div>${tags.map(a=>`<span class="tag">${esc(a)}</span>`).join('')}</div>
        <button class="bigbtn ghost" data-pop="${p.id}">+ Add-On</button>
      </div>`;
    }).join('');
    wrap.querySelectorAll('[data-pop]').forEach(b=>b.addEventListener('click', ()=>openAddonPopover(b.dataset.pop)));
  } else if(role==='photos'){
    wrap.innerHTML=rows.map(p=>{
      const hasJ=!!String(p.jersey||'').trim();
      return `<div class="prow photo-row">
        ${p.photo_url?`<img class="thumb" src="${esc(p.photo_url)}">`:'<div class="noimg">👤</div>'}
        <div class="who"><b>${esc(p.first)} ${esc(p.last)}</b><small>#${esc(p.jersey)||'—'} · ${esc(p.school)}</small></div>
        ${hasJ
          ? `<button class="bigbtn" data-photo="${p.id}">${p.photo_url?'Retake 📷':'Take Photo 📷'}</button>`
          : `<span class="badge due">Needs jersey</span>`}
      </div>`;
    }).join('');
    wrap.querySelectorAll('[data-photo]').forEach(b=>b.addEventListener('click', ()=>openCamera(b.dataset.photo)));
  } else if(role==='playerdata'){
    wrap.innerHTML=rows.map(p=>`<div class="prow photo-row">
      <img class="thumb" src="${esc(p.photo_url)}">
      <div class="who">
        <b>${esc(p.first)} ${esc(p.last)}</b>
        <small>#${esc(p.jersey)} · ${esc(p.grad_year)} · ${esc(p.position)||'—'} · ${esc(formatHeight(p.height))||'—'} · ${esc(p.school)}</small>
      </div>
      <span class="badge done">Ready</span>
      <button class="bigbtn ghost" data-photo="${p.id}">Retake 📷</button>
    </div>`).join('');
    wrap.querySelectorAll('[data-photo]').forEach(b=>b.addEventListener('click', ()=>openCamera(b.dataset.photo)));
  }
}

const ADDON_MENU=['Mixtape','Eval','Film','Academic'];
function openAddonPopover(id){
  document.querySelectorAll('.addon-pop,.scrim').forEach(x=>x.remove());
  const p=players.find(x=>x.id===id); if(!p) return;
  const active=new Set(p.addons_manual||[]);
  const scrim=document.createElement('div'); scrim.className='scrim';
  const pop=document.createElement('div'); pop.className='addon-pop';
  pop.innerHTML=`<div class="addon-pop-head">${esc(p.first)} ${esc(p.last)}</div>`
    + ADDON_MENU.map(a=>`<label class="addon-opt"><input type="checkbox" data-a="${esc(a)}" ${active.has(a)?'checked':''}> ${esc(a)}</label>`).join('')
    + `<div class="addon-custom"><input type="text" id="addonCustom" placeholder="Other…"><button class="bigbtn" id="addonCustomBtn">Add</button></div>`
    + `<button class="bigbtn ghost addon-close" id="addonClose">Done</button>`;
  document.body.appendChild(scrim); document.body.appendChild(pop);
  const close=()=>{ pop.remove(); scrim.remove(); };
  scrim.addEventListener('click', close);
  pop.querySelector('#addonClose').addEventListener('click', close);
  pop.querySelectorAll('input[data-a]').forEach(cb=>cb.addEventListener('change', async ()=>{
    const set=new Set(p.addons_manual||[]);
    if(cb.checked) set.add(cb.dataset.a); else set.delete(cb.dataset.a);
    await patchPlayer(id, {addons_manual:[...set]});
    renderList();
  }));
  pop.querySelector('#addonCustomBtn').addEventListener('click', async ()=>{
    const v=pop.querySelector('#addonCustom').value.trim(); if(!v) return;
    const set=new Set(p.addons_manual||[]); set.add(v);
    await patchPlayer(id, {addons_manual:[...set]});
    close(); renderList();
  });
}

// PHOTOS — live camera (preferred) or gallery, head-crop, upload to Storage
let camStream=null, camPlayerId=null, camBlob=null;

function stopCamera(){
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  const v=$('#camVideo'); if(v) v.srcObject=null;
}

function setCamMode(mode){
  // mode: live | preview
  const live=mode==='live';
  $('#camVideo').style.display=live?'block':'none';
  $('#camSnap').style.display=live?'none':'block';
  $('#camShutter').style.display=live?'':'none';
  $('#camRetake').style.display=live?'none':'';
  $('#camUse').style.display=live?'none':'';
}

async function openCamera(id){
  const p=players.find(x=>x.id===id); if(!p) return;
  if(!String(p.jersey||'').trim()){ toast('Assign a jersey before taking a photo'); return; }
  camPlayerId=id; camBlob=null;
  $('#camWho').textContent=`#${p.jersey} ${p.first} ${p.last}`;
  $('#photoInput').dataset.forId=id;
  setCamMode('live');
  $('#camModal').classList.add('on');
  $('#camModal').setAttribute('aria-hidden','false');
  stopCamera();
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      audio:false,
      video:{ facingMode:{ideal:'user'}, width:{ideal:1280}, height:{ideal:960} }
    });
    const v=$('#camVideo');
    v.srcObject=camStream;
    await v.play().catch(()=>{});
  }catch(err){
    // Camera blocked / not available — fall back to file picker (still opens device camera on most tablets)
    toast('Camera unavailable — opening device picker');
    closeCameraModal(false);
    $('#photoInput').click();
  }
}

function closeCameraModal(clearId){
  stopCamera();
  $('#camModal').classList.remove('on');
  $('#camModal').setAttribute('aria-hidden','true');
  setCamMode('live');
  camBlob=null;
  if(clearId!==false) camPlayerId=null;
}

$('#camCancel').addEventListener('click', ()=>closeCameraModal());
$('#camFile').addEventListener('click', ()=>{
  closeCameraModal(false);
  $('#photoInput').dataset.forId=camPlayerId;
  $('#photoInput').click();
});
$('#camShutter').addEventListener('click', async ()=>{
  const v=$('#camVideo'), c=$('#camSnap');
  if(!v.videoWidth){ toast('Camera not ready yet'); return; }
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  setCamMode('preview');
  stopCamera();
});
$('#camRetake').addEventListener('click', ()=>{
  if(camPlayerId) openCamera(camPlayerId);
});
$('#camUse').addEventListener('click', async ()=>{
  const c=$('#camSnap');
  if(!camPlayerId || !c.width) return;
  $('#camUse').disabled=true;
  try{
    const blob=await cropHeadFromCanvas(c);
    await uploadPlayerPhoto(camPlayerId, blob, 'jpg');
    closeCameraModal();
  }finally{ $('#camUse').disabled=false; }
});

async function detectFaceBox(source){
  // Chrome/Edge FaceDetector when available — finds the head so we can crop tight
  if(typeof FaceDetector==='undefined') return null;
  try{
    const detector=new FaceDetector({fastMode:true, maxDetectedFaces:1});
    const faces=await detector.detect(source);
    if(faces && faces[0] && faces[0].boundingBox) return faces[0].boundingBox;
  }catch(e){}
  return null;
}

function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

async function cropHeadFromCanvas(sourceCanvas){
  const w=sourceCanvas.width, h=sourceCanvas.height;
  let box=await detectFaceBox(sourceCanvas);
  let sx,sy,sw,sh;
  if(box && box.width>20 && box.height>20){
    // Upper-body crop: head + shoulders/chest, not a tight headshot
    const padX=box.width*1.15, padTop=box.height*0.95, padBot=box.height*2.4;
    sx=clamp(box.x-padX, 0, w);
    sy=clamp(box.y-padTop, 0, h);
    const right=clamp(box.x+box.width+padX, 0, w);
    const bottom=clamp(box.y+box.height+padBot, 0, h);
    sw=Math.max(40, right-sx); sh=Math.max(40, bottom-sy);
    // Portrait upper-body aspect (~3:4)
    const targetW=Math.min(w, Math.max(sw, sh*0.78));
    const targetH=Math.min(h, targetW*1.28);
    const cx=sx+sw/2, cy=sy+sh*0.38;
    sw=targetW; sh=targetH;
    sx=clamp(cx-sw/2, 0, w-sw);
    sy=clamp(cy-sh/2, 0, h-sh);
  } else {
    // Fallback: full-width portrait framed for upper body
    sw=Math.min(w, h*0.78);
    sh=Math.min(h, sw*1.28);
    sx=(w-sw)/2; sy=Math.max(0, h*0.04);
  }
  const out=document.createElement('canvas');
  const size=900;
  out.width=size; out.height=Math.round(size*(sh/sw));
  out.getContext('2d').drawImage(sourceCanvas, sx,sy,sw,sh, 0,0,out.width,out.height);
  return await new Promise(res=>out.toBlob(b=>res(b),'image/jpeg',0.9));
}

async function cropHeadFromFile(file){
  const bmp=await createImageBitmap(file);
  const c=document.createElement('canvas');
  c.width=bmp.width; c.height=bmp.height;
  c.getContext('2d').drawImage(bmp,0,0);
  bmp.close && bmp.close();
  return cropHeadFromCanvas(c);
}

async function uploadPlayerPhoto(id, blob, ext){
  if(!id || !blob) return;
  toast('Uploading photo…');
  try{
    const path=campCode+'/'+id+'.'+(ext||'jpg');
    const res=await fetch(SUPABASE_URL+'/storage/v1/object/player-photos/'+path,{
      method:'POST',
      headers:authHeaders({'Content-Type':blob.type||'image/jpeg','x-upsert':'true'}),
      body:blob
    });
    if(!res.ok){ toast('⚠ Upload failed'); return; }
    const publicUrl=SUPABASE_URL+'/storage/v1/object/public/player-photos/'+path;
    await patchPlayer(id, {photo_url:publicUrl+'?t='+Date.now()});
    toast('Photo saved ✓');
    renderList();
  }catch(err){ toast('⚠ Upload failed — check connection'); }
}

$('#photoInput').addEventListener('change', async e=>{
  const file=e.target.files[0]; const id=e.target.dataset.forId || camPlayerId;
  e.target.value='';
  if(!file || !id) return;
  const p=players.find(x=>x.id===id);
  if(p && !String(p.jersey||'').trim()){ toast('Assign a jersey before taking a photo'); return; }
  try{
    const blob=await cropHeadFromFile(file);
    await uploadPlayerPhoto(id, blob, 'jpg');
  }catch(err){
    // If crop fails, upload original so registration isn't blocked
    await uploadPlayerPhoto(id, file, (file.name.split('.').pop()||'jpg').toLowerCase());
  }
});
